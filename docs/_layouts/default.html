<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{{ page.title | default: site.title }} · MILU Software</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="Página inicial da documentação MILU">
      <span class="brand-mark">M</span>
      <span><strong>MILU</strong><small>Documentação pública</small></span>
    </a>
    <nav aria-label="Navegação principal">
      <a href="{{ '/primeiros-passos/' | relative_url }}">Primeiros passos</a>
      <a href="{{ '/modulos/' | relative_url }}">Módulos</a>
      <a href="{{ '/integracoes/' | relative_url }}">Integrações</a>
      <a href="{{ '/api/' | relative_url }}">API</a>
      <a href="{{ '/faq/' | relative_url }}">FAQ</a>
    </nav>
  </header>

  <main class="content-shell">
    <article class="content-card">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <p>© MILU Software. Documentação pública. Todos os direitos reservados.</p>
    <div>
      <a href="{{ '/seguranca/' | relative_url }}">Segurança</a>
      <a href="{{ '/roadmap/' | relative_url }}">Roadmap</a>
      <a href="https://github.com/ricardosiqueirarf-hash/milusoftware">GitHub</a>
    </div>
  </footer>
</body>
</html>
